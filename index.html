<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Coach — Surya's Wellness</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg-0:#0A0D0C; --bg-1:#0F1312; --bg-2:#15191A; --bg-3:#1C2122; --bg-4:#242A2B;
  --line:rgba(255,255,255,0.06); --line-s:rgba(255,255,255,0.12);
  --t-1:#F1F3F2; --t-2:rgba(241,243,242,0.68); --t-3:rgba(241,243,242,0.44); --t-4:rgba(241,243,242,0.26);
  --lime:oklch(0.86 0.17 128); --lime-d:oklch(0.86 0.17 128 / 0.14); --lime-b:oklch(0.92 0.19 128);
  --amber:oklch(0.82 0.16 72); --amber-d:oklch(0.82 0.16 72 / 0.14);
  --aqua:oklch(0.78 0.12 225); --aqua-d:oklch(0.78 0.12 225 / 0.14);
  --rose:oklch(0.72 0.17 20); --rose-d:oklch(0.72 0.17 20 / 0.14);
  --violet:oklch(0.74 0.13 290); --violet-d:oklch(0.74 0.13 290 / 0.14);
  --sans:'Inter',system-ui,sans-serif; --serif:'Instrument Serif',Georgia,serif; --mono:'JetBrains Mono',monospace;
  --pad:20px; --radius:18px;
}
[data-density="compact"]{--pad:14px;--radius:12px;}
*{box-sizing:border-box;-webkit-font-smoothing:antialiased;}
body{margin:0;background:#050706;color:var(--t-1);font-family:var(--sans);letter-spacing:-0.01em;}
.hero-num{font-family:var(--serif);font-weight:400;letter-spacing:-0.02em;line-height:1;display:inline-block;font-feature-settings:"lnum","tnum";}
.label{font-size:10.5px;font-weight:500;letter-spacing:0.12em;text-transform:uppercase;color:var(--t-3);}
.coach{font-family:var(--serif);letter-spacing:-0.01em;line-height:1.2;}
.card{background:var(--bg-2);border:0.5px solid var(--line);border-radius:var(--radius);padding:var(--pad);}
.card-ghost{background:var(--bg-1);border:0.5px solid var(--line);border-radius:var(--radius);padding:var(--pad);}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:10px 16px;border-radius:10px;font-size:13px;font-weight:600;border:none;cursor:pointer;font-family:inherit;transition:all .12s;letter-spacing:-0.01em;}
.btn:active{transform:scale(0.97);}
.btn-lime{background:var(--lime);color:#0A0D0C;}
.btn-lime:hover{background:var(--lime-b);}
.btn-ghost{background:var(--bg-3);color:var(--t-1);}
.btn-ghost:hover{background:var(--bg-4);}
.btn-outline{background:transparent;color:var(--t-2);border:0.5px solid var(--line-s);}
.chip{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:999px;font-size:11px;font-weight:500;background:var(--bg-3);color:var(--t-2);}
.chip.lime{background:var(--lime-d);color:var(--lime-b);}
.chip.amber{background:var(--amber-d);color:var(--amber);}
.chip.aqua{background:var(--aqua-d);color:var(--aqua);}
.chip.rose{background:var(--rose-d);color:var(--rose);}
.bar{height:6px;border-radius:999px;background:var(--bg-3);overflow:hidden;}
.bar>span{display:block;height:100%;border-radius:999px;background:var(--lime);transition:width .6s ease;}
button:focus{outline:none;}
input{font-family:inherit;}
.hide-scroll::-webkit-scrollbar{display:none;}
.hide-scroll{scrollbar-width:none;}
@keyframes breathe{0%,100%{opacity:0.9;}50%{opacity:1;transform:scale(1.05);}}
@keyframes pulse{0%{transform:scale(1);opacity:0.6;}100%{transform:scale(2);opacity:0;}}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
.fade-in{animation:fadeIn .3s ease both;}

/* App shell */
.shell{display:grid;grid-template-columns:240px 1fr;min-height:100vh;
  background:radial-gradient(ellipse 900px 600px at 15% 10%,rgba(180,230,120,0.06),transparent 60%),
    radial-gradient(ellipse 700px 500px at 85% 95%,rgba(120,180,220,0.04),transparent 60%),
    #050706;}
.sidebar{background:var(--bg-1);border-right:0.5px solid var(--line);padding:22px 14px;display:flex;flex-direction:column;gap:4px;}
.brand{display:flex;align-items:center;gap:10px;padding:0 6px;margin-bottom:24px;}
.brand-logo{width:30px;height:30px;border-radius:9px;background:linear-gradient(135deg,var(--lime),var(--lime-b));display:flex;align-items:center;justify-content:center;}
.brand-name{font-size:15px;font-weight:600;letter-spacing:-0.02em;}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;color:var(--t-2);font-size:13px;font-weight:500;background:transparent;border:none;cursor:pointer;font-family:inherit;text-align:left;}
.nav-item:hover{background:var(--bg-2);color:var(--t-1);}
.nav-item.active{background:var(--bg-3);color:var(--t-1);}
.nav-item.active .nav-icon{color:var(--lime);}
.nav-icon{color:var(--t-3);flex-shrink:0;}
.nav-section{font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:var(--t-4);padding:16px 12px 6px;font-weight:500;}
.main{padding:28px 36px 80px;max-width:1440px;width:100%;overflow-x:hidden;}
.topbar{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:24px;gap:20px;flex-wrap:wrap;}

/* Responsive */
@media (max-width:900px){
  .shell{grid-template-columns:1fr;}
  .sidebar{position:sticky;top:0;z-index:10;flex-direction:row;overflow-x:auto;padding:12px;gap:6px;}
  .sidebar .brand, .sidebar .nav-section, .sidebar .bottom-info{display:none;}
  .nav-item{flex-shrink:0;padding:8px 12px;font-size:12px;}
  .nav-item span.nav-label{display:inline;}
  .main{padding:20px 16px 80px;}
}

/* PDF drop zone */
.drop{border:1.5px dashed var(--line-s);border-radius:var(--radius);padding:24px;text-align:center;cursor:pointer;transition:all .15s;}
.drop:hover{border-color:var(--lime);background:var(--lime-d);}
.drop.active{border-color:var(--lime);background:var(--lime-d);}

/* Meal option tile */
.opt{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:12px;background:var(--bg-3);border:0.5px solid var(--line);cursor:pointer;transition:all .15s;}
.opt:hover{background:var(--bg-4);border-color:var(--line-s);}
.opt.picked{background:var(--lime-d);border-color:var(--lime);}
.opt-check{width:22px;height:22px;border-radius:7px;border:1.5px solid var(--t-3);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;}
.opt.picked .opt-check{background:var(--lime);border-color:var(--lime);}
.opt-name{font-size:13.5px;font-weight:500;color:var(--t-1);}
.opt-qty{font-size:11.5px;color:var(--t-3);margin-top:2px;}
.opt-kcal{font-size:15px;color:var(--t-2);font-family:var(--serif);}

/* Dialog */
.dialog-backdrop{position:fixed;inset:0;background:rgba(0,0,0,0.6);backdrop-filter:blur(10px);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px;}
.dialog{background:var(--bg-1);border:0.5px solid var(--line-s);border-radius:20px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;animation:fadeIn .25s ease;}
</style>
</head>

// ═══════════════════════════════════════════════════════════════
// STATE — localStorage persistence
// ═══════════════════════════════════════════════════════════════
const LSKEY = 'coach_v2';
const loadState = () => { try { return JSON.parse(localStorage.getItem(LSKEY)) || {}; } catch { return {}; } };
const saveState = (s) => localStorage.setItem(LSKEY, JSON.stringify(s));

function useAppState() {
  const init = loadState();
  const today = new Date().toISOString().slice(0,10);
  const [activeTab, setActiveTab] = React.useState(init.activeTab || 'meal');
  // log shape: { 'YYYY-MM-DD': { slotId: { items: [itemName, ...], time: 'HH:MM' } } }
  const [log, setLog] = React.useState(init.log || {});
  const [water, setWater] = React.useState(init.water || {}); // { date: ml }
  const [steps, setSteps] = React.useState(init.steps || { [today]: 4820 });
  const [workouts, setWorkouts] = React.useState(init.workouts || {}); // { date: [{name,dur,kcal,time}] }
  const [weight, setWeight] = React.useState(init.weight || { [today]: 88.2 });
  const [density, setDensity] = React.useState(init.density || 'spacious');

  React.useEffect(() => {
    saveState({ activeTab, log, water, steps, workouts, weight, density });
    document.documentElement.setAttribute('data-density', density);
  }, [activeTab, log, water, steps, workouts, weight, density]);

  return { activeTab, setActiveTab, log, setLog, water, setWater, steps, setSteps,
           workouts, setWorkouts, weight, setWeight, density, setDensity, today };
}

// ═══════════════════════════════════════════════════════════════
// NUTRITION HELPERS
// ═══════════════════════════════════════════════════════════════
const sumNutrition = (items) => {
  let kcal=0, p=0, c=0, f=0, fi=0;
  for (const it of items) {
    const n = NUTRITION[it];
    if (n) { kcal+=n[0]; p+=n[1]; c+=n[2]; f+=n[3]; fi+=n[4]; }
  }
  return { kcal:Math.round(kcal), p:+p.toFixed(1), c:+c.toFixed(1), f:+f.toFixed(1), fi:+fi.toFixed(1) };
};

const slotPlannedItems = (slot, picks = {}) => {
  // Given user picks per option group, return items and counts
  let items = [];
  if (slot.pickOne) {
    const pid = picks[slot.id];
    const opt = slot.options.find(o => o.id === pid) || slot.options[0];
    items = opt.items;
  } else if (slot.required) {
    slot.required.forEach(r => {
      if (r.pickOne) {
        const opt = r.options.find(o => o.id === picks[r.id]) || r.options[0];
        items.push(...opt.items);
      } else {
        items.push(...r.items);
      }
    });
  } else if (slot.sections) {
    slot.sections.forEach(s => {
      if (s.pickOne) {
        const opt = s.options.find(o => o.id === picks[s.id]) || s.options[0];
        items.push(...opt.items);
      } else {
        items.push(...s.items);
      }
    });
  }
  return items;
};

const dayTotals = (logForDay) => {
  let all = [];
  Object.values(logForDay || {}).forEach(m => { if (m.items) all.push(...m.items); });
  return sumNutrition(all);
};

// Plan baseline (average across most common picks) — used for target
const planTargets = () => {
  // Typical day using most common picks
  const typical = [
    'Lemon water (1 glass)','Cinnamon powder (pinch)','Almonds (6)','Walnuts (2)','Double-toned milk (150ml)',
    'Daliya veg upma (1.5 cup)','Veg curry (½ cup)',
    'Chia seeds (2 tsp)','Fruit, 125-150g',
    'Veg salad (1 cup)','Red rice (2 cups, 50g raw)','Veg curry (1 cup)','Dhal (½ cup)',
    'Boiled grams (1 cup)','Fruits (75g)','Lime water',
    'Veg salad (1 cup)','Veg curry (1 cup)','Jowari roti (3, ~33g each)','Soya curry (½ cup)',
    'Double-toned milk (150ml)','Pista, unsalted (10)',
  ];
  return sumNutrition(typical);
};
const TARGETS = planTargets();

function Ring({size=80,stroke=7,value=0,color='var(--lime)',track='var(--bg-3)',children}) {
  const r=(size-stroke)/2, C=2*Math.PI*r, o=C*(1-Math.max(0,Math.min(1,value)));
  return (<div style={{width:size,height:size,position:'relative'}}>
    <svg width={size} height={size} style={{transform:'rotate(-90deg)'}}>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={track} strokeWidth={stroke}/>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={stroke}
        strokeDasharray={C} strokeDashoffset={o} strokeLinecap="round"
        style={{transition:'stroke-dashoffset .6s ease'}}/>
    </svg>
    {children && <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center'}}>{children}</div>}
  </div>);
}

function StatTile({label,value,unit,sub,color='var(--t-1)',big=32}) {
  return (<div className="card" style={{padding:16}}>
    <div className="label" style={{marginBottom:8}}>{label}</div>
    <div style={{display:'flex',alignItems:'flex-end',gap:6}}>
      <span className="hero-num" style={{fontSize:big,color}}>{value}</span>
      {unit && <span style={{fontSize:12,color:'var(--t-3)',paddingBottom:3}}>{unit}</span>}
    </div>
    {sub && <div style={{fontSize:11.5,color:'var(--t-3)',marginTop:6}}>{sub}</div>}
  </div>);
}

  return (<div className="fade-in">

            </div>
            <div style={{marginTop:12,maxWidth:260}}>

          </div>
          <Ring size={100} stroke={9} value={totals.kcal/TARGETS.kcal}>

    <path d="M26 2 L42 2 L42 18 Q42 22 46 26 Q54 32 54 44 L54 100 Q54 106 48 106 L20 106 Q14 106 14 100 L14 44 Q14 32 22 26 Q26 22 26 18 Z" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.14)" strokeWidth="1"/>
    <g clipPath="url(#bm-clip)">
      <rect x="0" y={fillY} width="68" height="110" fill="var(--aqua)" style={{transition:'y 0.6s ease'}}/>

      </path>

  </svg>);
}

function MealLogger({ slot, picks, setPicks, logged, onLog, active }) {
  const [open, setOpen] = React.useState(active);
  const [selected, setSelected] = React.useState(new Set());
  const plannedItems = slotPlannedItems(slot, picks);
  const toggle = (it) => { const n = new Set(selected); n.has(it)?n.delete(it):n.add(it); setSelected(n); };
  const logSelected = () => { if (selected.size>0) { onLog([...selected]); setSelected(new Set()); setOpen(false); } };
  const logAll = () => { onLog(plannedItems); setOpen(false); };

  return (<div className="card" style={{padding:0,overflow:'hidden',borderColor:active?'var(--lime)':'var(--line)'}}>
    <button onClick={() => setOpen(!open)} style={{width:'100%',padding:'14px 16px',background:'transparent',border:'none',cursor:'pointer',fontFamily:'inherit',display:'flex',alignItems:'center',gap:12,textAlign:'left',color:'inherit'}}>
      <div style={{width:32,height:32,borderRadius:10,background:logged?'var(--lime-d)':active?'var(--lime-d)':'var(--bg-3)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,color:logged?'var(--lime)':active?'var(--lime)':'var(--t-3)'}}>
        {logged ? <Icon name="check" size={16} sw={2.5}/> : <Icon name="plate" size={16}/>}
      </div>
      <div style={{flex:1}}>
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          <span style={{fontSize:14,fontWeight:600}}>{slot.name}</span>
          <span style={{fontSize:11,color:'var(--t-3)'}}>{slot.time}</span>
          {active && !logged && <span className="chip lime" style={{padding:'2px 7px',fontSize:10}}>Up now</span>}
        </div>
        <div style={{fontSize:11,color:'var(--t-3)',marginTop:3}}>
          {logged ? `Logged ${logged.time}` : `${plannedItems.length} planned items`}
        </div>
      </div>
      <Icon name={open?'chevronD':'chevronR'} size={16} color="var(--t-3)"/>
    </button>

    {open && !logged && <div style={{padding:'0 16px 16px',borderTop:'0.5px solid var(--line)'}}>
      <div className="label" style={{margin:'14px 0 10px',fontSize:10}}>Check what you ate</div>
      <div style={{display:'flex',flexDirection:'column',gap:6}}>
        {plannedItems.map((it,i) => {
          const n = NUTRITION[it] || [0];
          const on = selected.has(it);
          return (<div key={i} className={`opt ${on?'picked':''}`} onClick={() => toggle(it)}>
            <div className="opt-check">{on && <Icon name="check" size={12} color="#0A0D0C" sw={3}/>}</div>
            <div style={{flex:1}}>
              <div className="opt-name">{it}</div>
              <div className="opt-qty">{n[1]}g P · {n[2]}g C · {n[3]}g F</div>
            </div>
            <div className="opt-kcal">{n[0]}</div>
          </div>);
        })}
      </div>
      <div style={{display:'flex',gap:8,marginTop:12}}>
        <button className="btn btn-ghost" style={{flex:1,fontSize:12}} onClick={logAll}>Log all planned</button>
        <button className="btn btn-lime" style={{flex:2,fontSize:12}} disabled={selected.size===0} onClick={logSelected}>
          Log {selected.size} selected
        </button>
      </div>
    </div>}

    {open && logged && <div style={{padding:'14px 16px',borderTop:'0.5px solid var(--line)'}}>
      <div style={{fontSize:12,color:'var(--t-2)',marginBottom:8}}>Logged at {logged.time}</div>
      <div style={{display:'flex',flexWrap:'wrap',gap:5}}>
        {logged.items.map((it,i) => <span key={i} className="chip lime" style={{fontSize:10.5}}>{it}</span>)}
      </div>
    </div>}
  </div>);
}

// TAB 3: PEDOMETER & WORKOUT
// ═══════════════════════════════════════════════════════════════
function WorkoutTab({ state }) {
  const { steps, setSteps, workouts, setWorkouts, today } = state;
  const daySteps = steps[today] || 0;
  const stepsTarget = 8000;
  const dayWorkouts = workouts[today] || [];

  const [timerOn, setTimerOn] = React.useState(false);
  const [elapsed, setElapsed] = React.useState(0);

  React.useEffect(() => {
    if (!timerOn) return;
    const t = setInterval(() => setElapsed(e => e+1), 1000);
    return () => clearInterval(t);
  }, [timerOn]);

  const addWalk = (mins) => {
    const kcal = Math.round(mins * 4.5);
    setWorkouts({...workouts, [today]: [...dayWorkouts, { name:'Post-meal walk', dur:mins, kcal, time:new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',hour12:false}) }]});
  };
  const addSteps = (n) => setSteps({...steps, [today]: daySteps + n});
  const saveWorkout = () => {
    if (elapsed < 30) return;
    const mins = Math.round(elapsed/60);
    addWalk(mins);
    setElapsed(0); setTimerOn(false);
  };

  const walksDone = dayWorkouts.filter(w => w.name.includes('walk')).length;
  const walksLeft = Math.max(0, 4 - walksDone);

  return (<div className="fade-in">
    <div className="topbar">
      <div>
        <div className="label">Movement · {new Date().toLocaleDateString('en-US',{weekday:'long',month:'short',day:'numeric'})}</div>
        <h1 style={{fontSize:32,fontWeight:600,letterSpacing:'-0.02em',margin:'6px 0 0'}}>Pedometer & Workout</h1>
        <div style={{fontSize:13,color:'var(--t-2)',marginTop:6}}>Prescribed: 15 min walking × 4 (post meals)</div>
      </div>
    </div>

    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14,marginBottom:20}}>
      {/* Pedometer big card */}
      <div className="card" style={{padding:24,display:'flex',flexDirection:'column',alignItems:'center'}}>
        <div className="label" style={{alignSelf:'flex-start'}}>Today's steps</div>
        <Ring size={200} stroke={14} value={daySteps/stepsTarget} color="var(--lime)">
          <div style={{textAlign:'center'}}>
            <div className="hero-num" style={{fontSize:48,color:'var(--t-1)'}}>{daySteps.toLocaleString()}</div>
            <div style={{fontSize:11,color:'var(--t-3)',marginTop:4}}>of {stepsTarget.toLocaleString()}</div>
          </div>
        </Ring>
        <div style={{fontSize:12,color:'var(--t-2)',marginTop:16,textAlign:'center',maxWidth:260,lineHeight:1.5}}>
          {daySteps < stepsTarget
            ? <>{(stepsTarget-daySteps).toLocaleString()} steps to go · <strong style={{color:'var(--amber)'}}>keep moving</strong></>
            : <strong style={{color:'var(--lime)'}}>Target crushed. Keep going.</strong>}
        </div>
        <div style={{display:'flex',gap:8,marginTop:18,width:'100%'}}>
          <button className="btn btn-ghost" style={{flex:1,fontSize:12}} onClick={() => addSteps(500)}>+500</button>
          <button className="btn btn-ghost" style={{flex:1,fontSize:12}} onClick={() => addSteps(1000)}>+1000</button>
          <button className="btn btn-ghost" style={{flex:1,fontSize:12}} onClick={() => addSteps(2000)}>+2000</button>
        </div>
      </div>

      {/* Prescribed walks grid */}
      <div className="card" style={{padding:22}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',marginBottom:16}}>
          <div>
            <div className="label">Prescribed walks</div>
            <div style={{fontSize:13,color:'var(--t-2)',marginTop:4}}>15 min · post each main meal</div>
          </div>
          <div>
            <span className="hero-num" style={{fontSize:28,color:'var(--lime)'}}>{walksDone}</span>
            <span style={{fontSize:13,color:'var(--t-3)'}}>/4</span>
          </div>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:10,marginBottom:16}}>
          {['After breakfast','After lunch','After snack','After dinner'].map((label,i) => {
            const done = i < walksDone;
            return (<div key={i} style={{padding:'14px 12px',borderRadius:12,background:done?'var(--lime-d)':'var(--bg-3)',border:`0.5px solid ${done?'var(--lime)':'var(--line)'}`,textAlign:'center'}}>
              <Icon name="shoe" size={22} color={done?'var(--lime)':'var(--t-3)'} sw={1.5}/>
              <div style={{fontSize:11,color:done?'var(--lime)':'var(--t-2)',marginTop:6,fontWeight:500}}>{label}</div>
              <div style={{fontSize:10,color:'var(--t-3)',marginTop:2}}>15 min</div>
            </div>);
          })}
        </div>

        {/* Live timer */}
        <div style={{padding:16,background:'var(--bg-3)',borderRadius:12,textAlign:'center'}}>
          <div className="label" style={{marginBottom:10,fontSize:10}}>Live timer</div>
          <div className="hero-num" style={{fontSize:44,color:'var(--t-1)',fontVariantNumeric:'tabular-nums'}}>
            {String(Math.floor(elapsed/60)).padStart(2,'0')}:{String(elapsed%60).padStart(2,'0')}
          </div>
          <div style={{display:'flex',gap:6,marginTop:14,justifyContent:'center'}}>
            <button className="btn btn-ghost" style={{fontSize:12,padding:'8px 14px'}} onClick={() => setTimerOn(!timerOn)}>
              <Icon name={timerOn?'pause':'play'} size={12}/> {timerOn?'Pause':'Start'}
            </button>
            <button className="btn btn-lime" style={{fontSize:12,padding:'8px 14px'}} onClick={saveWorkout} disabled={elapsed<30}>
              Save walk
            </button>
            <button className="btn btn-outline" style={{fontSize:12,padding:'8px 14px'}} onClick={() => setElapsed(0)}>Reset</button>
          </div>
        </div>
      </div>
    </div>

    {/* Today's log */}
    <div style={{display:'grid',gridTemplateColumns:'1.5fr 1fr',gap:14}}>
      <div>
        <div className="label" style={{marginBottom:12}}>Today's activity log</div>
        <div className="card" style={{padding:0,overflow:'hidden'}}>
          {dayWorkouts.length === 0 ? (
            <div style={{padding:30,textAlign:'center',color:'var(--t-3)',fontSize:13}}>No activity logged yet. Start the timer after your next meal.</div>
          ) : (
            dayWorkouts.map((w,i,a) => (<div key={i} style={{padding:'14px 16px',display:'flex',alignItems:'center',gap:12,borderBottom:i<a.length-1?'0.5px solid var(--line)':'none'}}>
              <div style={{width:38,height:38,borderRadius:10,background:'var(--lime-d)',display:'flex',alignItems:'center',justifyContent:'center'}}>
                <Icon name="shoe" size={18} color="var(--lime)"/>
              </div>
              <div style={{flex:1}}>
                <div style={{fontSize:13.5,fontWeight:500}}>{w.name}</div>
                <div style={{fontSize:11,color:'var(--t-3)',marginTop:2}}>{w.dur} min · logged {w.time}</div>
              </div>
              <div style={{textAlign:'right'}}>
                <div className="hero-num" style={{fontSize:18,color:'var(--amber)'}}>{w.kcal}</div>
                <div style={{fontSize:10,color:'var(--t-3)'}}>kcal burned</div>
              </div>
            </div>))
          )}
        </div>
      </div>

      <div>
        <div className="label" style={{marginBottom:12}}>Weekly steps</div>
        <WeekStepsBar steps={steps} today={today} target={stepsTarget}/>
      </div>
    </div>
  </div>);
}

function WeekStepsBar({steps,today,target}) {
  const days = [];
  for (let i=6;i>=0;i--) {
    const d = new Date(); d.setDate(d.getDate()-i);
    const ds = d.toISOString().slice(0,10);
    days.push({ label:d.toLocaleDateString('en-US',{weekday:'narrow'}), date:ds, val: steps[ds] ?? (i===0?0:Math.round(4000+Math.random()*5000)) });
  }
  const max = Math.max(target, ...days.map(d=>d.val));
  return (<div className="card" style={{padding:20}}>
    <div style={{display:'flex',alignItems:'flex-end',gap:8,height:140}}>
      {days.map((d,i) => {
        const isToday = d.date === today;
        const h = (d.val/max)*100;
        return (<div key={i} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:6,height:'100%'}}>
          <div style={{flex:1,width:'100%',display:'flex',alignItems:'flex-end'}}>
            <div style={{width:'100%',height:`${Math.max(h,3)}%`,borderRadius:6,background:isToday?'var(--lime)':d.val>=target?'var(--lime-d)':'var(--bg-3)',border:isToday?'none':'0.5px solid var(--line)',position:'relative'}}/>
          </div>
          <div style={{fontSize:10,color:isToday?'var(--t-1)':'var(--t-3)',fontWeight:isToday?600:400}}>{d.label}</div>
        </div>);
      })}
    </div>
    <div style={{marginTop:14,paddingTop:14,borderTop:'0.5px solid var(--line)',fontSize:11.5,color:'var(--t-2)',display:'flex',justifyContent:'space-between'}}>
      <span>Avg this week</span>
      <span className="hero-num" style={{fontSize:15,color:'var(--t-1)'}}>{Math.round(days.reduce((s,d)=>s+d.val,0)/7).toLocaleString()}</span>
    </div>
  </div>);
}

          <span style={{flex:1}}/>
          <span className="chip amber" style={{fontSize:10}}>goal 80kg</span>

    </div>
  </div>);

function KPI({label,value,unit,color,pct=0}) {
  return (<div className="card" style={{padding:16}}>
    <div className="label" style={{marginBottom:8}}>{label}</div>
    <div style={{display:'flex',alignItems:'flex-end',gap:5,marginBottom:10}}>
      <span className="hero-num" style={{fontSize:28,color}}>{value}</span>
      <span style={{fontSize:11,color:'var(--t-3)',paddingBottom:3}}>{unit}</span>
    </div>
    <div className="bar" style={{height:3}}><span style={{width:`${Math.min(100,pct*100)}%`,background:color}}/></div>
  </div>);
}

function Heatmap({ log, today }) {
  const cells = [];
  for (let i=27;i>=0;i--) {
    const d = new Date(); d.setDate(d.getDate()-i);
    const ds = d.toISOString().slice(0,10);
    const entry = log[ds];
    let v;
    if (ds === today) {
      v = entry ? Object.keys(entry).length/MEAL_SLOTS.length : 0;
    } else {
      // synthetic historical adherence
      v = entry ? Object.keys(entry).length/MEAL_SLOTS.length : (0.55 + Math.random()*0.45);
    }
    cells.push({ date: ds, val: v, today: ds===today });
  }
  return (<>
    <div style={{display:'grid',gridTemplateColumns:'repeat(14,1fr)',gap:4}}>
      {cells.map((c,i) => (<div key={i} title={`${c.date} — ${Math.round(c.val*100)}%`} style={{
        aspectRatio:'1',borderRadius:4,
        background: c.val>=0.9?'var(--lime)':c.val>=0.7?'color-mix(in oklab, var(--lime) 60%, var(--bg-3))':c.val>=0.5?'color-mix(in oklab, var(--amber) 50%, var(--bg-3))':'color-mix(in oklab, var(--rose) 40%, var(--bg-3))',
        border:c.today?'1.5px solid var(--t-1)':'none',
      }}/>))}
    </div>
    <div style={{display:'flex',alignItems:'center',gap:6,marginTop:12,fontSize:10.5,color:'var(--t-3)'}}>
      <span>Less</span>
      {[0.3,0.55,0.75,0.95].map((v,i) => (<div key={i} style={{width:14,height:14,borderRadius:3,background:v>=0.9?'var(--lime)':v>=0.7?'color-mix(in oklab, var(--lime) 60%, var(--bg-3))':v>=0.5?'color-mix(in oklab, var(--amber) 50%, var(--bg-3))':'color-mix(in oklab, var(--rose) 40%, var(--bg-3))'}}/>))}
      <span>Full plan</span>
    </div>
  </>);
}

function WeightChart() {
  const data = [91.5, 91.0, 90.6, 90.2, 89.7, 89.3, 89.0, 88.7, 88.5, 88.4, 88.3, 88.2];
  const W=300, H=100, pad=6;
  const mn=Math.min(...data)-0.5, mx=Math.max(...data)+0.5;
  const pts = data.map((v,i) => [pad+i/(data.length-1)*(W-pad*2), pad+(1-(v-mn)/(mx-mn))*(H-pad*2)]);
  const path = pts.map(([x,y],i) => `${i===0?'M':'L'}${x.toFixed(1)} ${y.toFixed(1)}`).join(' ');
  const area = path + ` L${pts[pts.length-1][0]} ${H-pad} L${pts[0][0]} ${H-pad} Z`;
  return (<svg viewBox={`0 0 ${W} ${H}`} style={{width:'100%',height:H,display:'block'}}>
    <defs><linearGradient id="wg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stopColor="oklch(0.86 0.17 128)" stopOpacity="0.3"/>
      <stop offset="100%" stopColor="oklch(0.86 0.17 128)" stopOpacity="0"/>
    </linearGradient></defs>
    <path d={area} fill="url(#wg)"/>
    <path d={path} fill="none" stroke="var(--lime)" strokeWidth="2" strokeLinecap="round"/>
    {pts.map(([x,y],i) => <circle key={i} cx={x} cy={y} r={i===pts.length-1?4:2} fill={i===pts.length-1?'var(--lime)':'var(--bg-0)'} stroke="var(--lime)" strokeWidth="1.5"/>)}
  </svg>);
}

  { id:'workout', label:'Pedometer/Workout',icon:'shoe' },
  { id:'metrics', label:'Metrics',          icon:'chart' },
];

function App() {
  const state = useAppState();
  const [showTweaks, setShowTweaks] = React.useState(false);

  React.useEffect(() => {
    const onMsg = (e) => {
      const d = e.data || {};
      if (d.type === '__activate_edit_mode') setShowTweaks(true);
      if (d.type === '__deactivate_edit_mode') setShowTweaks(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type:'__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const Body = {
    meal:    <MealPlanTab state={state} onSwitch={state.setActiveTab}/>,
    food:    <FoodWaterTab state={state}/>,
    workout: <WorkoutTab state={state}/>,
    metrics: <MetricsTab state={state}/>,
  }[state.activeTab];

  return (<div className="shell">
    <aside className="sidebar">
      <div className="brand">
        <div className="brand-logo"><Icon name="flame" size={16} color="#0A0D0C" sw={2.5}/></div>
        <div>
          <div className="brand-name">Coach</div>
          <div style={{fontSize:10,color:'var(--t-3)',letterSpacing:'0.06em'}}>Surya · Wk 3</div>
        </div>
      </div>
      <div className="nav-section">Tracker</div>
      {TABS.map(t => (<button key={t.id} data-screen-label={`0${TABS.indexOf(t)+1} ${t.label}`} className={`nav-item ${state.activeTab===t.id?'active':''}`} onClick={() => state.setActiveTab(t.id)}>
        <Icon name={t.icon} size={16} color="var(--t-3)"/>
        <span className="nav-label">{t.label}</span>
      </button>))}

      <div className="nav-section">Plan</div>
      <div style={{padding:'8px 12px',fontSize:11.5,color:'var(--t-3)',lineHeight:1.5}}>
        <div style={{color:'var(--t-2)',fontWeight:500}}>{PLAN_META.counselor}</div>
        <div style={{marginTop:2}}>{PLAN_META.prescribed.split(',')[0]}</div>
        <div style={{marginTop:6,fontSize:10}}>Next review {PLAN_META.reviewDate}</div>
      </div>

      <div style={{flex:1,minHeight:20}}/>
      <div className="bottom-info" style={{padding:'12px',borderTop:'0.5px solid var(--line)',marginTop:12,display:'flex',alignItems:'center',gap:10}}>
        <div style={{width:30,height:30,borderRadius:999,background:'var(--bg-4)',color:'var(--lime)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:600}}>ST</div>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontSize:12,fontWeight:500,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>Surya Teja</div>
          <div style={{fontSize:10,color:'var(--t-3)'}}>{PLAN_META.umr}</div>
        </div>
      </div>
    </aside>

    <main className="main">{Body}</main>

    {showTweaks && <TweaksPanel state={state}/>}
  </div>);
}

function TweaksPanel({ state }) {
  const { density, setDensity } = state;
  const setAndPersist = (v) => {
    setDensity(v);
    window.parent.postMessage({type:'__edit_mode_set_keys', edits:{ density:v }}, '*');
  };
  return (<div style={{position:'fixed',bottom:20,right:20,zIndex:100,width:260,padding:16,background:'rgba(21,25,26,0.95)',backdropFilter:'blur(16px)',border:'0.5px solid var(--line-s)',borderRadius:14,boxShadow:'0 20px 60px rgba(0,0,0,0.4)'}}>
    <div className="label" style={{marginBottom:12}}>Tweaks</div>
    <div style={{marginBottom:12}}>
      <div style={{fontSize:12,color:'var(--t-2)',marginBottom:6}}>Layout density</div>
      <div style={{display:'flex',gap:4,padding:3,background:'var(--bg-1)',borderRadius:8,border:'0.5px solid var(--line)'}}>
        {['spacious','compact'].map(v => (<button key={v} onClick={() => setAndPersist(v)}
          style={{flex:1,padding:'7px 6px',borderRadius:6,background:density===v?'var(--bg-4)':'transparent',color:density===v?'var(--t-1)':'var(--t-3)',border:'none',cursor:'pointer',fontFamily:'inherit',fontSize:11,fontWeight:500,textTransform:'capitalize'}}>{v}</button>))}
      </div>
    </div>
    <div style={{fontSize:11,color:'var(--t-3)',lineHeight:1.5,paddingTop:12,borderTop:'0.5px solid var(--line)'}}>
      Data is stored in your browser (localStorage). For the desktop app, install as a PWA from your browser menu.
    </div>
  </div>);
}

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "density": "compact"
}/*EDITMODE-END*/;

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>

</body>
</html>
